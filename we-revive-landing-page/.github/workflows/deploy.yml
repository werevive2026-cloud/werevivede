name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: we-revive-landing-page/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: we-revive-landing-page

      - name: Build
        run: pnpm build
        working-directory: we-revive-landing-page

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: we-revive-landing-page/out
